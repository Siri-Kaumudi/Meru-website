services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:27015:27017"
    volumes:
      - meru_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/meru-website
      PORT: 5500
    ports:
      - "127.0.0.1:5500:5500"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  meru_mongo_data:
