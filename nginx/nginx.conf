# Host Nginx config — copy to /etc/nginx/sites-available/meracorporation.in
# Frontend static files: /opt/meru-website/frontend/build/
# Backend API proxy: http://127.0.0.1:5500
#
# SSL certificates (created by Certbot):
#   /etc/letsencrypt/live/meracorporation.in/fullchain.pem
#   /etc/letsencrypt/live/meracorporation.in/privkey.pem

# HTTP — redirect all traffic to HTTPS (keep ACME challenge for cert renewal)
server {
    listen 80;
    server_name meracorporation.in www.meracorporation.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://meracorporation.in$request_uri;
    }
}

# HTTPS — main site
server {
    listen 443 ssl;
    server_name meracorporation.in;

    ssl_certificate /etc/letsencrypt/live/meracorporation.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meracorporation.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 6m;

    location /api/ {
        proxy_pass http://127.0.0.1:5500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /opt/meru-website/frontend/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS — redirect www to non-www
server {
    listen 443 ssl;
    server_name www.meracorporation.in;

    ssl_certificate /etc/letsencrypt/live/meracorporation.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meracorporation.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://meracorporation.in$request_uri;
}
