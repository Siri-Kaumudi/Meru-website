# Host Nginx config — copy to /etc/nginx/sites-available/merucorporation.in
# Frontend static files: /opt/meru-website/frontend/build/
# Backend API proxy: http://127.0.0.1:5500

server {
    listen 80;
    server_name merucorporation.in www.merucorporation.in;

    client_max_body_size 6m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Uncomment after SSL is configured (see DEPLOYMENT.md)
    # return 301 https://merucorporation.in$request_uri;

    location /api/ {
        proxy_pass http://127.0.0.1:5500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /opt/meru-website/frontend/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

