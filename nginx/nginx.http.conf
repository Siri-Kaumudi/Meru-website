# Bootstrap Nginx config — use ONLY before SSL certificates exist.
# Copy to /etc/nginx/sites-available/meracorporation.in, then run Certbot (see DEPLOYMENT.md).
# After certificates are issued, replace with nginx.conf (full HTTPS config).

server {
    listen 80;
    server_name meracorporation.in www.meracorporation.in;

    client_max_body_size 6m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /opt/meru-website/frontend/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
